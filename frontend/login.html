<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 光伏运维AI智能分析平台</title>
  <style>
    /* ============ CSS Variables & Reset ============ */
    :root {
      --bg-primary: #0b1120;
      --bg-secondary: #111b2f;
      --bg-card: #152035;
      --bg-card-hover: #1a2a44;
      --bg-input: #0d1525;
      --border: #1e3050;
      --border-light: #2a4060;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
      --accent: #00e5ff;
      --accent-dim: rgba(0, 229, 255, 0.15);
      --accent-glow: rgba(0, 229, 255, 0.3);
      --green: #00ff88;
      --green-dim: rgba(0, 255, 136, 0.15);
      --orange: #ff9800;
      --orange-dim: rgba(255, 152, 0, 0.15);
      --red: #ff3d71;
      --red-dim: rgba(255, 61, 113, 0.15);
      --blue: #448aff;
      --purple: #b388ff;
      --yellow: #ffd740;
      --radius: 10px;
      --radius-sm: 6px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --font-mono: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.6;
    }

    /* ============ Login Container ============ */
    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 1.5rem;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--accent), var(--blue));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 1rem;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .login-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.3rem;
      letter-spacing: 0.5px;
    }

    .login-header p {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* ============ Login Card ============ */
    .login-card {
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-secondary) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: var(--shadow);
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.6;
    }

    /* ============ Form ============ */
    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-bottom: 0.4rem;
      font-weight: 500;
    }

    .form-input-wrapper {
      position: relative;
    }

    .form-input-wrapper .input-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      opacity: 0.6;
      pointer-events: none;
    }

    .form-input {
      width: 100%;
      background: var(--bg-input);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 0.7rem 0.75rem 0.7rem 2.5rem;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      outline: none;
      font-family: var(--font-sans);
      transition: all 0.2s;
    }

    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .password-toggle {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 0.2rem;
      transition: color 0.2s;
    }

    .password-toggle:hover {
      color: var(--accent);
    }

    /* ============ Remember Me ============ */
    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }

    .checkbox-wrapper input[type="checkbox"] {
      display: none;
    }

    .checkbox-custom {
      width: 18px;
      height: 18px;
      border: 1px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      background: var(--bg-input);
    }

    .checkbox-wrapper input:checked + .checkbox-custom {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox-wrapper input:checked + .checkbox-custom::after {
      content: '✓';
      color: var(--bg-primary);
      font-size: 12px;
      font-weight: bold;
    }

    .checkbox-label {
      font-size: 0.82rem;
      color: var(--text-secondary);
      user-select: none;
    }

    /* ============ Button ============ */
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #0091ea);
      color: #000;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-sans);
      position: relative;
      overflow: hidden;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-login .btn-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .btn-spinner { display: block; }

    /* ============ Error Message ============ */
    .error-message {
      display: none;
      background: var(--red-dim);
      border: 1px solid rgba(255, 61, 113, 0.3);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      font-size: 0.82rem;
      color: var(--red);
      align-items: center;
      gap: 0.5rem;
    }

    .error-message.visible {
      display: flex;
    }

    .error-message .error-icon {
      font-size: 1rem;
      flex-shrink: 0;
    }

    /* ============ Footer ============ */
    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* ============ Responsive ============ */
    @media (max-width: 480px) {
      .login-wrapper { padding: 1rem; }
      .login-card { padding: 1.5rem; }
      .login-header h1 { font-size: 1.2rem; }
      .login-logo { width: 52px; height: 52px; font-size: 26px; }
    }
    @media (max-width: 380px) {
      .login-card { padding: 1.25rem; }
      .login-header h1 { font-size: 1.1rem; }
    }
    /* Touch-friendly inputs */
    @media (max-width: 768px) {
      .form-input { padding: 0.85rem 0.75rem 0.85rem 2.8rem; font-size: 1rem; min-height: 48px; }
      .password-toggle { min-height: 44px; min-width: 44px; display: flex; align-items: center; justify-content: center; padding: 0.5rem; }
      .btn-login { min-height: 48px; font-size: 1rem; }
      .form-group label { font-size: 0.88rem; }
      .checkbox-wrapper { min-height: 44px; }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-header">
      <div class="login-logo">☀</div>
      <h1>光伏运维AI智能分析平台</h1>
      <p>PV Operations & Maintenance Platform</p>
    </div>

    <div class="login-card">
      <div class="error-message" id="errorMsg">
        <span class="error-icon">⚠</span>
        <span id="errorText"></span>
      </div>

      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label for="username">用户名</label>
          <div class="form-input-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" id="username" class="form-input" placeholder="请输入用户名" autocomplete="username" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">密码</label>
          <div class="form-input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" class="form-input" placeholder="请输入密码" autocomplete="current-password" required>
            <button type="button" class="password-toggle" onclick="togglePassword()" title="显示/隐藏密码">👁</button>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-wrapper">
            <input type="checkbox" id="rememberMe">
            <span class="checkbox-custom"></span>
            <span class="checkbox-label">记住我</span>
          </label>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span class="btn-text">登 录</span>
          <div class="btn-spinner"></div>
        </button>
      </form>
    </div>

    <div class="login-footer">
      &copy; 2025 光伏运维平台 · PV Ops Platform
    </div>
  </div>

  <script>
    const API = 'http://localhost:3000/api';

    // Check if already logged in
    (function() {
      const token = localStorage.getItem('authToken');
      if (token) {
        // Verify token is still valid
        fetch(API + '/auth/me', {
          headers: { 'Authorization': 'Bearer ' + token }
        }).then(function(res) {
          if (res.ok) {
            window.location.href = 'index.html';
          } else {
            localStorage.removeItem('authToken');
            localStorage.removeItem('currentUser');
          }
        }).catch(function() {
          // Server unreachable, stay on login page
        });
      }
    })();

    function togglePassword() {
      var pwd = document.getElementById('password');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
    }

    function showError(msg) {
      var el = document.getElementById('errorMsg');
      document.getElementById('errorText').textContent = msg;
      el.classList.add('visible');
    }

    function hideError() {
      document.getElementById('errorMsg').classList.remove('visible');
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideError();

      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      var rememberMe = document.getElementById('rememberMe').checked;
      var btn = document.getElementById('loginBtn');

      if (!username || !password) {
        showError('请输入用户名和密码');
        return false;
      }

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        var res = await fetch(API + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: username, password: password, rememberMe: rememberMe })
        });

        var json = await res.json();

        if (!res.ok || !json.success) {
          var errorMsg = json.error || '登录失败';
          if (errorMsg === 'Invalid username or password') {
            errorMsg = '用户名或密码错误';
          } else if (errorMsg === 'Account is deactivated') {
            errorMsg = '账户已被禁用，请联系管理员';
          }
          showError(errorMsg);
          return false;
        }

        // Store token and user info
        var token = json.data.token;
        var user = json.data.user;

        localStorage.setItem('authToken', token);
        localStorage.setItem('currentUser', JSON.stringify({
          id: user.id,
          username: user.username,
          displayName: user.display_name || user.username,
          role: user.role,
          email: user.email
        }));

        // Redirect to dashboard
        window.location.href = 'index.html';

      } catch (err) {
        showError('网络连接失败，请检查后端服务是否运行');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }

      return false;
    }

    // Enter key support for password field
    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        document.getElementById('loginForm').dispatchEvent(new Event('submit'));
      }
    });

    // Focus username on load
    document.getElementById('username').focus();
  </script>
</body>
</html>
