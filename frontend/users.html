<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账号管理 - 光伏运维AI智能分析平台</title>
  <style>
    /* ============ CSS Variables & Reset ============ */
    :root {
      --bg-primary: #0b1120;
      --bg-secondary: #111b2f;
      --bg-card: #152035;
      --bg-card-hover: #1a2a44;
      --bg-input: #0d1525;
      --border: #1e3050;
      --border-light: #2a4060;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
      --accent: #00e5ff;
      --accent-dim: rgba(0, 229, 255, 0.15);
      --accent-glow: rgba(0, 229, 255, 0.3);
      --green: #00ff88;
      --green-dim: rgba(0, 255, 136, 0.15);
      --orange: #ff9800;
      --orange-dim: rgba(255, 152, 0, 0.15);
      --red: #ff3d71;
      --red-dim: rgba(255, 61, 113, 0.15);
      --blue: #448aff;
      --purple: #b388ff;
      --yellow: #ffd740;
      --radius: 10px;
      --radius-sm: 6px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --font-mono: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

    /* ============ Navbar ============ */
    .navbar {
      background: linear-gradient(180deg, var(--bg-secondary) 0%, rgba(17,27,47,0.95) 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
    }
    .navbar-brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.15rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.5px; text-decoration: none;
    }
    .navbar-brand .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--blue));
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .navbar-tabs { display: flex; gap: 4px; margin-left: 2.5rem; }
    .nav-tab {
      background: none; border: none; color: var(--text-secondary);
      padding: 0.5rem 1.1rem; border-radius: 6px; font-size: 0.88rem;
      cursor: pointer; transition: all 0.25s; font-family: var(--font-sans);
      white-space: nowrap; position: relative; text-decoration: none;
      display: flex; align-items: center;
    }
    .nav-tab:hover { color: var(--text-primary); background: var(--accent-dim); }
    .nav-tab.active { color: var(--accent); background: var(--accent-dim); }
    .nav-tab.active::after {
      content: ''; position: absolute; bottom: -1px; left: 20%; right: 20%;
      height: 2px; background: var(--accent); border-radius: 1px;
    }
    .navbar-right { margin-left: auto; display: flex; align-items: center; gap: 1.2rem; }
    #userInfo { display:flex;align-items:center;gap:0.5rem;padding:0.25rem 0.6rem;background:var(--bg-card);border:1px solid var(--border);border-radius:6px; }
    #userDisplayName { font-size:0.8rem;color:var(--text-secondary);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    .clock { font-family: var(--font-mono); font-size: 0.9rem; color: var(--text-secondary); }
    .hamburger { display: none; background: none; border: none; color: var(--text-secondary); font-size: 1.5rem; cursor: pointer; padding: 0.4rem; margin-left: 0.5rem; min-width: 44px; min-height: 44px; align-items: center; justify-content: center; border-radius: 6px; transition: all 0.2s; }
    .hamburger:hover { color: var(--accent); background: var(--accent-dim); }

    /* ============ Main ============ */
    .main { max-width: 1400px; margin: 0 auto; padding: 1.25rem 1.5rem; }

    /* ============ Stats Grid ============ */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.25rem; }
    .stat-card {
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-secondary) 100%);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.25rem 1.5rem; position: relative; overflow: hidden;
      transition: all 0.3s;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.6;
    }
    .stat-card:hover { border-color: var(--border-light); transform: translateY(-2px); box-shadow: var(--shadow); }
    .stat-card .stat-icon { font-size: 1.5rem; margin-bottom: 0.5rem; opacity: 0.8; }
    .stat-card .stat-label { font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.4rem; }
    .stat-card .stat-value { font-size: 2rem; font-weight: 700; font-family: var(--font-mono); color: var(--text-primary); line-height: 1.2; }
    .stat-card .stat-sub { font-size: 0.75rem; margin-top: 0.5rem; color: var(--text-muted); }

    /* ============ Section ============ */
    .section {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.25rem;
    }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border);
    }
    .section-title {
      font-size: 1rem; font-weight: 600; display: flex; align-items: center;
      gap: 0.5rem; color: var(--text-primary);
    }
    .section-title .icon { color: var(--accent); font-size: 1.1rem; }

    /* ============ Table ============ */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th, .data-table td {
      padding: 0.7rem 0.85rem; text-align: left; border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .data-table th {
      color: var(--text-muted); font-weight: 500; text-transform: uppercase;
      font-size: 0.72rem; letter-spacing: 0.5px; background: var(--bg-secondary);
    }
    .data-table tr:hover td { background: var(--bg-card-hover); }
    .data-table tr:last-child td { border-bottom: none; }

    /* ============ Badges ============ */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 0.2rem 0.55rem; border-radius: 20px; font-size: 0.72rem; font-weight: 600;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .badge-admin { background: var(--red-dim); color: var(--red); }
    .badge-admin .badge-dot { background: var(--red); box-shadow: 0 0 4px var(--red); }
    .badge-manager { background: var(--orange-dim); color: var(--orange); }
    .badge-manager .badge-dot { background: var(--orange); box-shadow: 0 0 4px var(--orange); }
    .badge-operator { background: var(--blue); color: #fff; }
    .badge-operator .badge-dot { background: #fff; }
    .badge-viewer { background: rgba(148,163,184,0.15); color: var(--text-secondary); }
    .badge-viewer .badge-dot { background: var(--text-secondary); }
    .badge-active { background: var(--green-dim); color: var(--green); }
    .badge-active .badge-dot { background: var(--green); box-shadow: 0 0 4px var(--green); }
    .badge-inactive { background: var(--red-dim); color: var(--red); }
    .badge-inactive .badge-dot { background: var(--red); }

    /* ============ Buttons ============ */
    .btn {
      background: linear-gradient(135deg, var(--accent), #0091ea);
      color: #000; border: none; padding: 0.55rem 1.2rem;
      border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; font-family: var(--font-sans);
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px var(--accent-glow); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.78rem; }
    .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,61,113,0.3); }
    .btn-danger:hover { background: rgba(255,61,113,0.25); }

    /* ============ Forms ============ */
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 0.3rem; font-weight: 500; }
    .form-group input, .form-group select {
      width: 100%; background: var(--bg-input); color: var(--text-primary);
      border: 1px solid var(--border); padding: 0.55rem 0.75rem;
      border-radius: var(--radius-sm); font-size: 0.85rem; outline: none;
      font-family: var(--font-sans);
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    /* ============ Modal ============ */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 200; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem; width: 90%; max-width: 480px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border);
    }
    .modal-header h3 { font-size: 1.05rem; color: var(--accent); }
    .modal-close {
      background: none; border: none; color: var(--text-muted); font-size: 1.3rem;
      cursor: pointer; padding: 0.2rem; transition: color 0.2s;
    }
    .modal-close:hover { color: var(--red); }
    .modal-footer { display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.25rem; }

    /* ============ Loading / Empty ============ */
    .loading { display: flex; align-items: center; justify-content: center; padding: 3rem; color: var(--text-muted); gap: 0.75rem; }
    .spinner { width: 22px; height: 22px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-msg { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.88rem; }
    .error-msg { text-align: center; padding: 2rem; color: var(--red); font-size: 0.88rem; }

    /* ============ Toast ============ */
    .toast-container { position: fixed; top: 80px; right: 1.5rem; z-index: 300; display: flex; flex-direction: column; gap: 0.5rem; }
    .toast {
      padding: 0.85rem 1.2rem; border-radius: var(--radius-sm); font-size: 0.85rem;
      animation: slideIn 0.3s ease; max-width: 350px; box-shadow: var(--shadow);
    }
    .toast-success { background: var(--green-dim); border: 1px solid rgba(0,255,136,0.3); color: var(--green); }
    .toast-error { background: var(--red-dim); border: 1px solid rgba(255,61,113,0.3); color: var(--red); }
    .toast-info { background: var(--accent-dim); border: 1px solid rgba(0,229,255,0.3); color: var(--accent); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: none; opacity: 1; } }

    /* ============ Responsive ============ */
    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .navbar { padding: 0 1rem; }
      .navbar-tabs { margin-left: 1.5rem; }
      .main { padding: 1rem; }
    }
    @media (max-width: 768px) {
      .hamburger { display: flex; }
      .navbar-tabs {
        position: fixed; top: 60px; left: 0; right: 0; bottom: 0;
        background: var(--bg-secondary); flex-direction: column; padding: 1rem;
        gap: 0; margin-left: 0; overflow-y: auto; transform: translateX(-100%);
        transition: transform 0.3s ease; z-index: 99; border-top: 1px solid var(--border);
      }
      .navbar-tabs.open { transform: translateX(0); }
      .nav-tab { padding: 0.85rem 1rem; font-size: 0.95rem; border-radius: 8px; margin-bottom: 0.25rem; min-height: 44px; }
      .nav-tab.active::after { display: none; }
      .nav-tab.active { border-left: 3px solid var(--accent); }
      .clock { font-size: 0.8rem; }
      .btn { padding: 0.7rem 1rem; font-size: 0.88rem; min-height: 44px; }
      .btn-sm { padding: 0.5rem 0.8rem; font-size: 0.82rem; min-height: 38px; }
      .form-row { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr !important; }
      .data-table { font-size: 0.8rem; }
      .data-table th, .data-table td { padding: 0.5rem 0.6rem; }
    }
    @media (max-width: 600px) {
      .navbar-brand span { display: none; }
      .main { padding: 0.75rem; }
      .section { padding: 0.85rem; border-radius: 8px; }
      .modal { padding: 1rem; }
    }
  </style>
</head>
<body>
  <!-- ============ Navbar ============ -->
  <nav class="navbar">
    <a class="navbar-brand" href="index.html">
      <div class="logo-icon">☀</div>
      <span>光伏运维AI智能分析平台</span>
    </a>
    <button class="hamburger" id="hamburgerBtn" onclick="toggleHamburger()" aria-label="菜单">☰</button>
    <div class="navbar-tabs">
      <a class="nav-tab" href="index.html">📊 监控大屏</a>
      <a class="nav-tab" href="analysis.html">🔍 智能分析</a>
      <a class="nav-tab" href="alert-rules.html">🔔 告警规则</a>
      <a class="nav-tab" href="inspection.html">📋 巡检管理</a>
      <a class="nav-tab" href="workorder.html">📝 工单管理</a>
      <a class="nav-tab" href="spare-parts.html">📦 备品备件</a>
      <a class="nav-tab" id="nav-audit" href="audit.html">🛡️ 审计日志</a>
      <a class="nav-tab active" id="nav-users" href="users.html">👥 账号管理</a>
    </div>
    <div class="navbar-right">
      <div id="userInfo">
        <span id="userDisplayName">--</span>
        <button class="btn btn-sm btn-outline" onclick="openPasswordModal()">修改密码</button>
        <button class="btn btn-sm btn-outline" onclick="handleLogout()">退出</button>
      </div>
      <div class="clock"><span id="clockTime"></span></div>
    </div>
  </nav>

  <!-- ============ Toast Container ============ -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ============ Main ============ -->
  <main class="main">
    <!-- Stats Cards -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Users Section -->
    <div class="section">
      <div class="section-header">
        <div class="section-title"><span class="icon">👥</span> 账号列表</div>
        <div style="display:flex;gap:0.5rem;">
          <button class="btn btn-sm" id="addUserBtn" onclick="openCreateModal()">＋ 新增账号</button>
          <button class="btn btn-sm btn-outline" onclick="loadUsers()">🔄 刷新</button>
        </div>
      </div>

      <!-- Table -->
      <div id="userTableContainer">
        <div class="loading"><div class="spinner"></div>加载用户列表...</div>
      </div>
    </div>
  </main>

  <!-- ============ Create/Edit User Modal ============ -->
  <div class="modal-overlay" id="userModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">新增账号</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="userForm" onsubmit="return handleSaveUser(event)">
        <input type="hidden" id="editUserId">
        <div class="form-group">
          <label for="formUsername">用户名 *</label>
          <input type="text" id="formUsername" placeholder="请输入用户名" required>
        </div>
        <div class="form-group" id="passwordGroup">
          <label for="formPassword">密码 *</label>
          <input type="password" id="formPassword" placeholder="至少6位字符">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="formDisplayName">显示名称</label>
            <input type="text" id="formDisplayName" placeholder="例如：张三">
          </div>
          <div class="form-group">
            <label for="formEmail">邮箱</label>
            <input type="text" id="formEmail" placeholder="可选">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="formRole">角色 *</label>
            <select id="formRole" required>
              <option value="admin">管理员 (admin)</option>
              <option value="manager">经理 (manager)</option>
              <option value="operator" selected>运维人员 (operator)</option>
              <option value="viewer">只读用户 (viewer)</option>
            </select>
          </div>
          <div class="form-group" id="statusGroup" style="display:none;">
            <label for="formStatus">状态</label>
            <select id="formStatus">
              <option value="1">启用</option>
              <option value="0">禁用</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal()">取消</button>
          <button type="submit" class="btn" id="saveBtn">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ============ Change Password Modal ============ -->
  <div class="modal-overlay" id="passwordModal">
    <div class="modal">
      <div class="modal-header">
        <h3>修改密码</h3>
        <button class="modal-close" onclick="closePasswordModal()">&times;</button>
      </div>
      <form id="passwordForm" onsubmit="return handleChangePassword(event)">
        <div class="form-group">
          <label for="currentPassword">当前密码 *</label>
          <input type="password" id="currentPassword" placeholder="请输入当前密码" required>
        </div>
        <div class="form-group">
          <label for="newPassword">新密码 *</label>
          <input type="password" id="newPassword" placeholder="至少6位字符" required>
        </div>
        <div class="form-group">
          <label for="confirmPassword">确认新密码 *</label>
          <input type="password" id="confirmPassword" placeholder="请再次输入新密码" required>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closePasswordModal()">取消</button>
          <button type="submit" class="btn" id="changePasswordBtn">确认修改</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    /* ============ Configuration ============ */
    const API = 'http://localhost:3000/api';
    let allUsers = [];
    let currentUser = null;

    /* ============ Auth Check ============ */
    (function() {
      const token = localStorage.getItem('authToken');
      if (!token) {
        window.location.href = 'login.html';
        return;
      }
      fetch(API + '/auth/me', {
        headers: { 'Authorization': 'Bearer ' + token }
      }).then(function(res) {
        if (!res.ok) {
          localStorage.removeItem('authToken');
          localStorage.removeItem('currentUser');
          window.location.href = 'login.html';
          return;
        }
        return res.json();
      }).then(function(json) {
        if (json && json.success && json.data) {
          currentUser = json.data;
          var userStr = localStorage.getItem('currentUser');
          if (!userStr) {
            localStorage.setItem('currentUser', JSON.stringify({
              id: currentUser.id,
              username: currentUser.username,
              displayName: currentUser.display_name || currentUser.username,
              role: currentUser.role
            }));
          }
          document.getElementById('userDisplayName').textContent = currentUser.display_name || currentUser.username;
          if (currentUser.role !== 'admin') {
            document.getElementById('addUserBtn').style.display = 'none';
            showToast('⚠️ 仅管理员可以管理账号', 'error');
          }
        }
      }).catch(function() {
        window.location.href = 'login.html';
      });
    })();

    /* ============ Hamburger Menu ============ */
    function toggleHamburger() {
      var tabBar = document.querySelector('.navbar-tabs');
      var btn = document.getElementById('hamburgerBtn');
      tabBar.classList.toggle('open');
      btn.classList.toggle('active');
      btn.innerHTML = tabBar.classList.contains('open') ? '✕' : '☰';
    }

    /* ============ Clock ============ */
    function updateClock() {
      document.getElementById('clockTime').textContent = new Date().toLocaleTimeString('zh-CN', { hour12: false });
    }
    setInterval(updateClock, 1000);
    updateClock();

    /* ============ Toast ============ */
    function showToast(message, type) {
      var container = document.getElementById('toastContainer');
      var toast = document.createElement('div');
      toast.className = 'toast toast-' + (type || 'info');
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(function() {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        setTimeout(function() { toast.remove(); }, 300);
      }, 3000);
    }

    /* ============ Load Users ============ */
    async function loadUsers() {
      var container = document.getElementById('userTableContainer');
      container.innerHTML = '<div class="loading"><div class="spinner"></div>加载用户列表...</div>';

      try {
        var token = localStorage.getItem('authToken');
        var res = await fetch(API + '/auth/users', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        var json = await res.json();

        if (!res.ok || !json.success) {
          container.innerHTML = '<div class="error-msg">加载失败 — ' + (json.error || '请确认已登录') + '</div>';
          return;
        }

        allUsers = json.data || [];
        if (allUsers.length === 0) {
          container.innerHTML = '<div class="empty-msg">📭 暂无用户记录</div>';
          renderStats(0, 0, 0, 0);
          return;
        }

        renderStats(allUsers.length,
          allUsers.filter(function(u) { return u.is_active; }).length,
          allUsers.filter(function(u) { return u.role === 'admin'; }).length,
          allUsers.filter(function(u) { return u.last_login; }).length
        );
        renderTable(allUsers);
      } catch (e) {
        console.error('Failed to load users:', e);
        container.innerHTML = '<div class="error-msg">网络错误，请稍后重试</div>';
      }
    }

    /* ============ Render Stats ============ */
    function renderStats(total, active, admins, hasLogin) {
      document.getElementById('statsGrid').innerHTML =
        '<div class="stat-card"><div class="stat-icon">👥</div><div class="stat-label">总用户数</div><div class="stat-value">' + total + '</div><div class="stat-sub">已注册账号</div></div>' +
        '<div class="stat-card"><div class="stat-icon">✅</div><div class="stat-label">活跃用户</div><div class="stat-value">' + active + '</div><div class="stat-sub">正常启用中</div></div>' +
        '<div class="stat-card"><div class="stat-icon">👑</div><div class="stat-label">管理员</div><div class="stat-value">' + admins + '</div><div class="stat-sub">admin 角色</div></div>' +
        '<div class="stat-card"><div class="stat-icon">🕐</div><div class="stat-label">已登录</div><div class="stat-value">' + hasLogin + '</div><div class="stat-sub">有登录记录</div></div>';
    }

    /* ============ Render Table ============ */
    function renderTable(users) {
      var container = document.getElementById('userTableContainer');
      var roleMap = { admin: '管理员', manager: '经理', operator: '运维人员', viewer: '只读用户' };

      var html = '<table class="data-table"><thead><tr>';
      html += '<th>用户名</th><th>显示名称</th><th>邮箱</th><th>角色</th><th>状态</th><th>最后登录</th><th>创建时间</th><th>操作</th>';
      html += '</tr></thead><tbody>';

      users.forEach(function(user) {
        var roleClass = 'badge-' + (user.role || 'viewer');
        var roleLabel = roleMap[user.role] || user.role;
        var statusClass = user.is_active ? 'badge-active' : 'badge-inactive';
        var statusLabel = user.is_active ? '启用' : '禁用';
        var lastLogin = user.last_login ? new Date(user.last_login + 'Z').toLocaleString('zh-CN', {
          year: 'numeric', month: '2-digit', day: '2-digit',
          hour: '2-digit', minute: '2-digit', hour12: false
        }) : '<span style="color:var(--text-muted);">从未登录</span>';
        var createdAt = user.created_at ? new Date(user.created_at + 'Z').toLocaleString('zh-CN', {
          year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false
        }) : '-';
        var isSelf = currentUser && parseInt(user.id) === currentUser.id;
        var actionBtns = '<button class="btn btn-sm btn-outline" onclick="openEditModal(' + user.id + ')">编辑</button> ';
        if (!isSelf) {
          actionBtns += '<button class="btn btn-sm btn-danger" onclick="toggleUserStatus(' + user.id + ', ' + (user.is_active ? 0 : 1) + ')">' + (user.is_active ? '禁用' : '启用') + '</button>';
        } else {
          actionBtns += '<span style="color:var(--text-muted);font-size:0.75rem;">(当前账号)</span>';
        }

        html += '<tr>';
        html += '<td style="font-family:var(--font-mono);font-size:0.82rem;">' + user.username + '</td>';
        html += '<td>' + (user.display_name || '-') + '</td>';
        html += '<td style="color:var(--text-muted);">' + (user.email || '-') + '</td>';
        html += '<td><span class="badge ' + roleClass + '"><span class="badge-dot"></span>' + roleLabel + '</span></td>';
        html += '<td><span class="badge ' + statusClass + '"><span class="badge-dot"></span>' + statusLabel + '</span></td>';
        html += '<td style="font-size:0.8rem;">' + lastLogin + '</td>';
        html += '<td style="font-size:0.8rem;">' + createdAt + '</td>';
        html += '<td style="white-space:nowrap;">' + actionBtns + '</td>';
        html += '</tr>';
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    }

    /* ============ Modal ============ */
    function openCreateModal() {
      document.getElementById('modalTitle').textContent = '新增账号';
      document.getElementById('editUserId').value = '';
      document.getElementById('formUsername').value = '';
      document.getElementById('formPassword').value = '';
      document.getElementById('formDisplayName').value = '';
      document.getElementById('formEmail').value = '';
      document.getElementById('formRole').value = 'operator';
      document.getElementById('passwordGroup').style.display = 'block';
      document.getElementById('statusGroup').style.display = 'none';
      document.getElementById('formUsername').removeAttribute('readonly');
      document.getElementById('userModal').classList.add('active');
      document.getElementById('formUsername').focus();
    }

    function openEditModal(userId) {
      var user = allUsers.find(function(u) { return u.id === userId; });
      if (!user) return;

      document.getElementById('modalTitle').textContent = '编辑账号 — ' + user.username;
      document.getElementById('editUserId').value = user.id;
      document.getElementById('formUsername').value = user.username;
      document.getElementById('formUsername').setAttribute('readonly', true);
      document.getElementById('formPassword').value = '';
      document.getElementById('formDisplayName').value = user.display_name || '';
      document.getElementById('formEmail').value = user.email || '';
      document.getElementById('formRole').value = user.role || 'operator';
      document.getElementById('passwordGroup').style.display = 'block';
      document.querySelector('#passwordGroup label').textContent = '新密码（留空则不修改）';
      document.getElementById('statusGroup').style.display = 'block';
      document.getElementById('formStatus').value = user.is_active ? '1' : '0';
      document.getElementById('userModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('userModal').classList.remove('active');
      document.querySelector('#passwordGroup label').textContent = '密码 *';
    }

    /* ============ Save User ============ */
    async function handleSaveUser(e) {
      e.preventDefault();
      var btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = '保存中...';

      var userId = document.getElementById('editUserId').value;
      var token = localStorage.getItem('authToken');
      var username = document.getElementById('formUsername').value.trim();
      var password = document.getElementById('formPassword').value;
      var displayName = document.getElementById('formDisplayName').value.trim();
      var email = document.getElementById('formEmail').value.trim();
      var role = document.getElementById('formRole').value;
      var isActive = parseInt(document.getElementById('formStatus').value);

      var body = { username: username, displayName: displayName, email: email, role: role };
      if (userId) {
        // Edit mode
        if (password) body.password = password;
        body.is_active = isActive;
      } else {
        // Create mode
        if (!password || password.length < 6) {
          showToast('密码至少需要6位字符', 'error');
          btn.disabled = false;
          btn.textContent = '保存';
          return false;
        }
        body.password = password;
      }

      try {
        var url = userId ? API + '/auth/users/' + userId : API + '/auth/register';
        var method = userId ? 'PUT' : 'POST';
        var res = await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify(body)
        });
        var json = await res.json();

        if (!res.ok || !json.success) {
          showToast('保存失败：' + (json.error || '未知错误'), 'error');
        } else {
          showToast(userId ? '账号已更新 ✅' : '账号已创建 ✅', 'success');
          closeModal();
          loadUsers();
        }
      } catch (err) {
        showToast('网络错误：' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '保存';
      }
      return false;
    }

    /* ============ Toggle User Status ============ */
    async function toggleUserStatus(userId, newStatus) {
      var token = localStorage.getItem('authToken');
      try {
        var res = await fetch(API + '/auth/users/' + userId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ is_active: newStatus })
        });
        var json = await res.json();
        if (!res.ok || !json.success) {
          showToast('操作失败：' + (json.error || '未知错误'), 'error');
        } else {
          showToast(newStatus ? '账号已启用 ✅' : '账号已禁用 ✅', 'success');
          loadUsers();
        }
      } catch (err) {
        showToast('网络错误', 'error');
      }
    }

    /* ============ Logout ============ */
    function handleLogout() {
      var token = localStorage.getItem('authToken');
      if (token) {
        fetch(API + '/auth/logout', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token }
        }).catch(function() {});
      }
      localStorage.removeItem('authToken');
      localStorage.removeItem('currentUser');
      window.location.href = 'login.html';
    }

    /* ============ Change Password ============ */
    function openPasswordModal() {
      document.getElementById('passwordModal').classList.add('active');
      document.getElementById('currentPassword').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('confirmPassword').value = '';
      document.getElementById('currentPassword').focus();
    }

    function closePasswordModal() {
      document.getElementById('passwordModal').classList.remove('active');
    }

    async function handleChangePassword(e) {
      e.preventDefault();
      var btn = document.getElementById('changePasswordBtn');
      var currentPassword = document.getElementById('currentPassword').value;
      var newPassword = document.getElementById('newPassword').value;
      var confirmPassword = document.getElementById('confirmPassword').value;

      if (!currentPassword) {
        showToast('请输入当前密码', 'error');
        return false;
      }
      if (!newPassword || newPassword.length < 6) {
        showToast('新密码至少需要6位字符', 'error');
        return false;
      }
      if (newPassword !== confirmPassword) {
        showToast('两次输入的新密码不一致', 'error');
        return false;
      }

      btn.disabled = true;
      btn.textContent = '修改中...';

      try {
        var token = localStorage.getItem('authToken');
        var res = await fetch(API + '/auth/change-password', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ currentPassword: currentPassword, newPassword: newPassword })
        });
        var json = await res.json();

        if (!res.ok || !json.success) {
          showToast('修改失败：' + (json.error || '未知错误'), 'error');
        } else {
          showToast('密码修改成功 ✅', 'success');
          closePasswordModal();
        }
      } catch (err) {
        showToast('网络错误：' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '确认修改';
      }
      return false;
    }

    /* ============ Initialize ============ */
    document.addEventListener('DOMContentLoaded', function() {
      loadUsers();
    });

    // Close modal on overlay click
    document.getElementById('userModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    document.getElementById('passwordModal').addEventListener('click', function(e) {
      if (e.target === this) closePasswordModal();
    });

    // Close modal on Escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeModal();
        closePasswordModal();
      }
    });
  
    /* ============ Role-Based Access Control ============ */
    var ROLES = { admin: 4, manager: 3, operator: 2, viewer: 1 };
    function getUserRole() {
      var userStr = localStorage.getItem("currentUser");
      if (!userStr) { window.location.href = "login.html"; return "viewer"; }
      try { return JSON.parse(userStr).role || "viewer"; } catch(e) { return "viewer"; }
    }
    function hasPermission(minRole) { return (ROLES[getUserRole()] || 0) >= (ROLES[minRole] || 1); }
    function hideElement(id) { var el = document.getElementById(id); if (el) el.style.display = "none"; }
    function showElement(id) { var el = document.getElementById(id); if (el) el.style.display = ""; }

    // Admin-only page: redirect non-admin users
    if (!hasPermission("admin")) {
      window.location.href = "index.html";
    }

  </script>
</body>
</html>
