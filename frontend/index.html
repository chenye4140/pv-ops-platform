<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>光伏运维平台 - Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: #111827;
      --bg-card: #1a2236;
      --bg-card-hover: #1f2b42;
      --border: #2a3550;
      --text-primary: #e5e7eb;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --accent: #06b6d4;
      --accent-glow: rgba(6, 182, 212, 0.15);
      --green: #10b981;
      --red: #ef4444;
      --orange: #f59e0b;
      --blue: #3b82f6;
      --purple: #8b5cf6;
      --yellow: #eab308;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* Navbar */
    .navbar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
    }
    .navbar-brand svg { width: 28px; height: 28px; }
    .navbar-links {
      display: flex;
      gap: 0.5rem;
      margin-left: 3rem;
    }
    .navbar-links a {
      color: var(--text-secondary);
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .navbar-links a:hover, .navbar-links a.active {
      color: var(--accent);
      background: var(--accent-glow);
    }
    .navbar-right { margin-left: auto; display: flex; align-items: center; gap: 1rem; }
    .station-select {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
    }
    .station-select:focus { border-color: var(--accent); }

    /* Main Content */
    .main { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem; }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .stat-card:hover::before { opacity: 1; }
    .stat-card .label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }
    .stat-card .value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .stat-card .unit {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 400;
      margin-left: 4px;
    }
    .stat-card .trend {
      font-size: 0.75rem;
      margin-top: 0.5rem;
    }
    .trend-up { color: var(--green); }
    .trend-down { color: var(--red); }

    /* Section */
    .section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-title .icon { color: var(--accent); }

    /* Chart */
    .chart-container {
      width: 100%;
      height: 400px;
      border-radius: 8px;
    }

    /* Table */
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }
    .data-table th, .data-table td {
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .data-table th {
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.5px;
    }
    .data-table tr:hover td { background: var(--bg-card-hover); }
    .data-table tr:last-child td { border-bottom: none; }

    /* Status badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0.25rem 0.6rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-normal { background: rgba(16,185,129,0.15); color: var(--green); }
    .badge-warning { background: rgba(245,158,11,0.15); color: var(--orange); }
    .badge-error { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge-dot {
      width: 6px; height: 6px; border-radius: 50%; display: inline-block;
    }
    .badge-normal .badge-dot { background: var(--green); }
    .badge-warning .badge-dot { background: var(--orange); }
    .badge-error .badge-dot { background: var(--red); }

    /* Alerts */
    .alert-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .alert-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 1rem;
      border-radius: 8px;
      border-left: 3px solid;
      background: var(--bg-secondary);
    }
    .alert-critical { border-left-color: var(--red); background: rgba(239,68,68,0.05); }
    .alert-warning { border-left-color: var(--orange); background: rgba(245,158,11,0.05); }
    .alert-info { border-left-color: var(--blue); background: rgba(59,130,246,0.05); }
    .alert-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 2px; }
    .alert-content { flex: 1; }
    .alert-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.25rem; }
    .alert-meta { font-size: 0.8rem; color: var(--text-muted); }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      color: var(--text-muted);
    }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 0.75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      text-align: center;
      padding: 2rem;
      color: var(--red);
      font-size: 0.9rem;
    }

    /* Two columns layout */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .two-col { grid-template-columns: 1fr; }
      .main { padding: 1rem; }
    }
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .navbar { padding: 0 1rem; }
      .navbar-links { margin-left: 1.5rem; }
      .navbar-links a { padding: 0.4rem 0.6rem; font-size: 0.8rem; }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="3" width="20" height="14" rx="2" />
        <line x1="8" y1="21" x2="16" y2="21" />
        <line x1="12" y1="17" x2="12" y2="21" />
        <line x1="7" y1="10" x2="17" y2="10" />
        <line x1="12" y1="3" x2="12" y2="10" />
      </svg>
      PV运维平台
    </a>
    <div class="navbar-links">
      <a href="index.html" class="active">Dashboard</a>
      <a href="analysis.html">图像分析</a>
      <a href="daily-report.html">日报</a>
    </div>
    <div class="navbar-right">
      <select class="station-select" id="stationSelect">
        <option value="1">电站 #1 - 示范电站</option>
      </select>
    </div>
  </nav>

  <main class="main">
    <!-- Stats Cards -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="label">今日发电量</div>
        <div class="value" id="todayEnergy">--<span class="unit">kWh</span></div>
      </div>
      <div class="stat-card">
        <div class="label">当前功率</div>
        <div class="value" id="currentPower">--<span class="unit">kW</span></div>
      </div>
      <div class="stat-card">
        <div class="label">性能比 PR</div>
        <div class="value" id="pr">--<span class="unit">%</span></div>
      </div>
      <div class="stat-card">
        <div class="label">异常组串</div>
        <div class="value" id="abnormalStrings">--</div>
      </div>
      <div class="stat-card">
        <div class="label">活跃告警</div>
        <div class="value" id="activeAlerts">--</div>
      </div>
    </div>

    <!-- Power Chart -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">
          <span class="icon">⚡</span> 逆变器发电曲线
        </div>
        <span style="font-size:0.8rem; color:var(--text-muted);" id="chartDate"></span>
      </div>
      <div class="chart-container" id="powerChart"></div>
    </div>

    <!-- Inverters & Alerts -->
    <div class="two-col">
      <div class="section">
        <div class="section-header">
          <div class="section-title">
            <span class="icon">🔌</span> 逆变器状态
          </div>
          <span id="inverterCount" style="font-size:0.8rem; color:var(--text-muted);"></span>
        </div>
        <div id="inverterTable">
          <div class="loading"><div class="spinner"></div>加载中...</div>
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="section-title">
            <span class="icon">🔔</span> 活跃告警
          </div>
          <span id="alertCount" style="font-size:0.8rem; color:var(--text-muted);"></span>
        </div>
        <div id="alertList">
          <div class="loading"><div class="spinner"></div>加载中...</div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const API = 'http://localhost:3000/api';
    let stationId = '1';
    let powerChart = null;

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadStations();
      loadDashboard();
      document.getElementById('stationSelect').addEventListener('change', (e) => {
        stationId = e.target.value;
        loadDashboard();
      });
    });

    async function loadStations() {
      try {
        const res = await fetch(`${API}/stations`);
        const json = await res.json();
        if (json.success && json.data.length > 0) {
          const select = document.getElementById('stationSelect');
          select.innerHTML = json.data.map(s =>
            `<option value="${s.id}">电站 #${s.id} - ${s.name}</option>`
          ).join('');
        }
      } catch (e) {
        console.warn('Failed to load stations:', e);
      }
    }

    async function loadDashboard() {
      loadOverview();
      loadInverters();
      loadAlerts();
      loadPowerChart();
    }

    async function loadOverview() {
      try {
        const res = await fetch(`${API}/stations/${stationId}/overview`);
        const json = await res.json();
        if (json.success) {
          const d = json.data;
          document.getElementById('todayEnergy').innerHTML =
            `${(d.today_energy_kwh || 0).toFixed(1)}<span class="unit">kWh</span>`;
          document.getElementById('currentPower').innerHTML =
            `${(d.current_power_kw || 0).toFixed(1)}<span class="unit">kW</span>`;
          document.getElementById('pr').innerHTML =
            `${(d.performance_ratio || 0).toFixed(1)}<span class="unit">%</span>`;
          document.getElementById('abnormalStrings').innerHTML =
            `<span style="color: ${d.abnormal_string_count > 0 ? 'var(--orange)' : 'var(--green)'}">${d.abnormal_string_count || 0}</span>`;
          // Active alerts will be loaded separately
        }
      } catch (e) {
        console.error('Overview load failed:', e);
        document.getElementById('todayEnergy').innerHTML = '<span style="color:var(--red)">加载失败</span>';
      }
    }

    async function loadInverters() {
      const container = document.getElementById('inverterTable');
      container.innerHTML = '<div class="loading"><div class="spinner"></div>加载中...</div>';
      try {
        const res = await fetch(`${API}/stations/${stationId}/inverters`);
        const json = await res.json();
        if (json.success && json.data.length > 0) {
          document.getElementById('inverterCount').textContent = `共 ${json.data.length} 台`;
          container.innerHTML = `
            <table class="data-table">
              <thead>
                <tr>
                  <th>名称</th>
                  <th>型号</th>
                  <th>状态</th>
                  <th>组串数</th>
                  <th>异常组串</th>
                </tr>
              </thead>
              <tbody>
                ${json.data.map(inv => {
                  const isNormal = inv.abnormal_string_count === 0;
                  const statusClass = isNormal ? 'badge-normal' : (inv.abnormal_string_count > 2 ? 'badge-error' : 'badge-warning');
                  const statusText = isNormal ? '正常' : '异常';
                  return `<tr>
                    <td>${inv.name || inv.id}</td>
                    <td style="color:var(--text-secondary)">${inv.model || '-'}</td>
                    <td><span class="badge ${statusClass}"><span class="badge-dot"></span>${statusText}</span></td>
                    <td>${inv.string_count || 0}</td>
                    <td style="color: ${isNormal ? 'var(--green)' : 'var(--red)'}">${inv.abnormal_string_count || 0}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>`;
        } else {
          container.innerHTML = '<div class="error-msg">暂无逆变器数据</div>';
        }
      } catch (e) {
        container.innerHTML = '<div class="error-msg">加载逆变器数据失败</div>';
      }
    }

    async function loadAlerts() {
      const container = document.getElementById('alertList');
      container.innerHTML = '<div class="loading"><div class="spinner"></div>加载中...</div>';
      try {
        const res = await fetch(`${API}/alerts?stationId=${stationId}&status=active`);
        const json = await res.json();
        if (json.success) {
          const alerts = json.data || [];
          document.getElementById('alertCount').textContent = `共 ${alerts.length} 条`;
          document.getElementById('activeAlerts').innerHTML =
            `<span style="color: ${alerts.length > 0 ? 'var(--orange)' : 'var(--green)'}">${alerts.length}</span>`;
          if (alerts.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:2rem; color:var(--green);">✅ 暂无活跃告警</div>';
            return;
          }
          container.innerHTML = `<div class="alert-list">
            ${alerts.map(a => {
              const cls = a.severity === 'critical' ? 'alert-critical' :
                          a.severity === 'warning' ? 'alert-warning' : 'alert-info';
              const icon = a.severity === 'critical' ? '🔴' :
                           a.severity === 'warning' ? '🟡' : '🔵';
              const sevText = a.severity === 'critical' ? '严重' :
                              a.severity === 'warning' ? '警告' : '提示';
              const time = a.created_at ? new Date(a.created_at).toLocaleString('zh-CN') : '';
              return `<div class="alert-item ${cls}">
                <span class="alert-icon">${icon}</span>
                <div class="alert-content">
                  <div class="alert-title">${a.message || a.title || '未命名告警'}</div>
                  <div class="alert-meta">${sevText} · ${time}${a.inverter_name ? ' · ' + a.inverter_name : ''}</div>
                </div>
              </div>`;
            }).join('')}
          </div>`;
        }
      } catch (e) {
        container.innerHTML = '<div class="error-msg">加载告警数据失败</div>';
      }
    }

    async function loadPowerChart() {
      const chartDom = document.getElementById('powerChart');
      if (!powerChart) powerChart = echarts.init(chartDom, 'dark');
      chartDom.innerHTML = '';
      powerChart = echarts.init(chartDom, 'dark');

      powerChart.setOption({
        title: { text: '加载中...', left: 'center', textStyle: { color: '#6b7280' } }
      });

      try {
        // Load inverters first to know which ones exist
        const invRes = await fetch(`${API}/stations/${stationId}/inverters`);
        const invJson = await invRes.json();
        if (!invJson.success || invJson.data.length === 0) {
          powerChart.setOption({ title: { text: '暂无逆变器数据', left: 'center', textStyle: { color: '#6b7280' } } });
          return;
        }

        const inverters = invJson.data;
        const now = new Date();
        const startTime = new Date(now);
        startTime.setHours(0, 0, 0, 0);
        const endTime = new Date(now);
        endTime.setHours(23, 59, 59, 999);

        // Fetch power data for each inverter's strings
        const seriesData = {};
        inverters.forEach(inv => { seriesData[inv.id] = []; });

        // We need to fetch strings for each inverter then power data
        const allSeries = [];

        for (const inv of inverters) {
          try {
            const strRes = await fetch(`${API}/stations/${stationId}/inverters/${inv.id}/strings`);
            const strJson = await strRes.json();
            if (strJson.success && strJson.data.length > 0) {
              // Fetch power data for first string as representative
              const firstString = strJson.data[0];
              const pwRes = await fetch(`${API}/power-data?stringId=${firstString.id}&startTime=${startTime.toISOString()}&endTime=${endTime.toISOString()}`);
              const pwJson = await pwRes.json();
              if (pwJson.success && pwJson.data.length > 0) {
                // Aggregate by time
                const timeMap = {};
                pwJson.data.forEach(p => {
                  const t = new Date(p.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                  if (!timeMap[t]) timeMap[t] = 0;
                  timeMap[t] += (p.power_w || 0) / 1000; // sum in kW
                });
                // Scale by number of strings
                const count = strJson.data.length;
                const values = Object.entries(timeMap).map(([t, v]) => [t, v]);
                values.sort((a, b) => a[0].localeCompare(b[0]));
                allSeries.push({
                  name: inv.name || `INV-${inv.id}`,
                  data: values.map(v => v[1]),
                  count: count
                });
              }
            }
          } catch (e) {
            console.warn(`Failed to load power for inverter ${inv.id}:`, e);
          }
        }

        // Get time axis from first series
        let timeAxis = [];
        if (allSeries.length > 0) {
          // Need to re-fetch to get timestamps
          try {
            const strRes = await fetch(`${API}/stations/${stationId}/inverters/${inverters[0].id}/strings`);
            const strJson = await strRes.json();
            if (strJson.success && strJson.data.length > 0) {
              const pwRes = await fetch(`${API}/power-data?stringId=${strJson.data[0].id}&startTime=${startTime.toISOString()}&endTime=${endTime.toISOString()}`);
              const pwJson = await pwRes.json();
              if (pwJson.success) {
                const timeSet = new Set();
                pwJson.data.forEach(p => {
                  timeSet.add(new Date(p.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }));
                });
                timeAxis = Array.from(timeSet).sort();
              }
            }
          } catch(e) {}
        }

        document.getElementById('chartDate').textContent = now.toLocaleDateString('zh-CN');

        powerChart.setOption({
          tooltip: { trigger: 'axis', formatter: '{b}<br/>{a}: {c} kW' },
          legend: { data: allSeries.map(s => s.name), top: 0, textStyle: { color: '#9ca3af' } },
          grid: { left: '3%', right: '4%', bottom: '3%', top: '12%', containLabel: true },
          xAxis: { type: 'category', data: timeAxis, axisLine: { lineStyle: { color: '#2a3550' } }, axisLabel: { color: '#9ca3af' } },
          yAxis: { type: 'value', name: '功率 (kW)', nameTextStyle: { color: '#9ca3af' }, axisLine: { lineStyle: { color: '#2a3550' } }, splitLine: { lineStyle: { color: '#1a2236' } }, axisLabel: { color: '#9ca3af' } },
          series: allSeries.map(s => ({
            name: s.name,
            type: 'line',
            smooth: true,
            data: s.data,
            symbol: 'none',
            lineStyle: { width: 2 },
            areaStyle: { opacity: 0.1 }
          }))
        });
      } catch (e) {
        console.error('Power chart load failed:', e);
        powerChart.setOption({ title: { text: '发电曲线加载失败', left: 'center', textStyle: { color: '#ef4444' } } });
      }

      window.addEventListener('resize', () => powerChart.resize());
    }
  </script>
</body>
</html>
